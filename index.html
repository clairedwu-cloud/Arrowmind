<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="format-detection" content="telephone=no">
<link rel="manifest" href="manifest.json">
<title>Arrow Puzzle · 100 Levels</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@800;900&display=swap');

:root {
  --bg: #0a0a0f; --surface: #13131f; --border: #1e1e30;
  --accent: #00f5a0; --accent2: #f5a000; --danger: #f54060;
  --text: #e8e8f0; --muted: #5a5a7a; --cell: #1a1a2e; --cell-hover: #202040;
  --cell-size: 62px;
  --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left: env(safe-area-inset-left, 0px); --safe-right: env(safe-area-inset-right, 0px);
}
*, *::before, *::after {
  margin:0; padding:0; box-sizing:border-box;
  -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none;
  user-select:none; -webkit-user-select:none;
}
html { height:100%; overflow:hidden; overscroll-behavior:none; }
body {
  background:var(--bg); color:var(--text);
  font-family:'Space Mono','Courier New',monospace;
  height:100%; display:flex; flex-direction:column; align-items:center;
  padding-top:max(12px,var(--safe-top)); padding-bottom:max(16px,var(--safe-bottom));
  padding-left:max(16px,var(--safe-left)); padding-right:max(16px,var(--safe-right));
  overflow:hidden; overscroll-behavior:none;
}
body::before {
  content:''; position:fixed; inset:0;
  background:radial-gradient(ellipse at 20% 20%,rgba(0,245,160,.04) 0%,transparent 50%),
             radial-gradient(ellipse at 80% 80%,rgba(245,160,0,.04) 0%,transparent 50%);
  pointer-events:none; z-index:0;
}

/* ── 语言切换 ── */
.lang-bar {
  display:flex; gap:5px; justify-content:flex-end;
  width:100%; max-width:520px; position:relative; z-index:10;
  margin-bottom:6px; flex-shrink:0;
}
.lang-btn {
  background:var(--surface); border:1px solid var(--border);
  border-radius:6px; padding:4px 8px; font-size:0.6rem;
  color:var(--muted); cursor:pointer; min-height:30px;
  display:flex; align-items:center; justify-content:center;
  font-family:'Space Mono',monospace;
}
.lang-btn.active { border-color:var(--accent); color:var(--accent); }
.lang-btn.active-touch { background:var(--cell-hover); }

.screen {
  width:100%; max-width:520px; position:relative; z-index:1;
  flex:1; overflow-y:auto; overflow-x:hidden;
  overscroll-behavior:contain; -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.screen::-webkit-scrollbar { display:none; }

/* ── Level Select ── */
#screenSelect { display:flex; flex-direction:column; gap:14px; align-items:center; padding-bottom:24px; }
.logo { text-align:center; margin-bottom:2px; padding-top:2px; }
.logo h1 {
  font-family:'Syne','Arial Black',sans-serif;
  font-size:clamp(2rem,8vw,2.8rem); font-weight:900; letter-spacing:-2px; line-height:1;
  background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.logo p { font-size:clamp(.55rem,2vw,.65rem); color:var(--muted); letter-spacing:3px; text-transform:uppercase; margin-top:4px; }
.chapter { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
.chapter-header { padding:10px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
.chapter-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.chapter-title { font-size:clamp(.6rem,2vw,.7rem); letter-spacing:2px; text-transform:uppercase; font-weight:700; }
.chapter-sub { font-size:.6rem; color:var(--muted); margin-left:auto; }
.level-grid { display:grid; grid-template-columns:repeat(10,1fr); }
.lvl-btn {
  aspect-ratio:1; display:flex; align-items:center; justify-content:center;
  font-size:clamp(.55rem,1.8vw,.65rem); font-weight:700; cursor:pointer;
  border:1px solid var(--border); color:var(--muted); min-height:36px; position:relative;
}
.lvl-btn.active-touch { background:var(--cell-hover); color:var(--text); }
.lvl-btn.completed { color:var(--accent); }
.lvl-btn.completed::after { content:'✓'; position:absolute; top:2px; right:3px; font-size:.4rem; color:var(--accent); }

/* ── Game Screen ── */
#screenGame { display:none; flex-direction:column; gap:10px; align-items:center; padding-bottom:8px; }
.top-bar { display:flex; align-items:center; justify-content:space-between; width:100%; flex-shrink:0; }
.back-btn {
  background:var(--surface); border:1px solid var(--border); color:var(--text);
  padding:10px 14px; border-radius:8px; font-family:'Space Mono',monospace; font-size:.65rem;
  cursor:pointer; min-width:60px; min-height:44px; display:flex; align-items:center; justify-content:center;
}
.level-info { text-align:center; }
.level-num {
  font-family:'Syne','Arial Black',sans-serif; font-size:clamp(.9rem,4vw,1.1rem); font-weight:900;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.level-tag { font-size:.6rem; color:var(--muted); letter-spacing:1px; }
.info-bar { display:flex; gap:8px; width:100%; flex-shrink:0; }
.info-box { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:8px 6px; text-align:center; }
.info-label { font-size:.5rem; color:var(--muted); letter-spacing:1px; text-transform:uppercase; }
.info-value { font-size:clamp(1rem,4vw,1.2rem); font-weight:700; color:var(--accent); margin-top:2px; }
.target-box {
  width:100%; background:var(--surface); border:1px solid var(--border);
  border-left:3px solid var(--accent); border-radius:10px;
  padding:8px 12px; font-size:.7rem; color:var(--muted);
  display:flex; align-items:center; gap:10px; flex-shrink:0;
}
.target-arrow { font-size:1.4rem; }
.target-text strong { color:var(--accent); }
.grid-wrap { overflow:auto; width:100%; display:flex; justify-content:center; flex-shrink:0; touch-action:none; }
.grid { display:grid; gap:3px; background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:10px; flex-shrink:0; }
.cell {
  width:var(--cell-size); height:var(--cell-size); background:var(--cell);
  border:2px solid var(--border); border-radius:8px;
  display:flex; align-items:center; justify-content:center; cursor:pointer;
  transition:background .1s,border-color .1s,transform .1s; position:relative; min-width:36px; min-height:36px;
}
.cell.fixed { cursor:default; background:#0d1a12; border-color:rgba(0,245,160,.3); }
.cell.fixed .a-icon { color:var(--accent); filter:drop-shadow(0 0 5px var(--accent)); }
.cell.user-placed .a-icon { color:var(--accent2); }
.cell.wrong { border-color:var(--danger); background:#1f0a0e; animation:shake .3s ease; }
.cell.sel { border-color:var(--accent2); box-shadow:0 0 0 2px rgba(245,160,0,.25); }
.cell.active-touch:not(.fixed):not(.header-cell) { background:var(--cell-hover); border-color:var(--muted); transform:scale(1.06); }
.cell.header-cell { cursor:default; background:transparent; border:none; font-size:clamp(.7rem,3vw,.9rem); font-weight:700; color:var(--accent); }
.a-icon { font-size:clamp(1.2rem,5vw,1.8rem); line-height:1; }
@keyframes pop   { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
.dir-picker { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:10px; width:100%; flex-shrink:0; }
.dir-label { font-size:.6rem; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; text-align:center; }
.dir-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; }
.dir-btn {
  background:var(--cell); border:2px solid var(--border); border-radius:8px; height:48px;
  display:flex; align-items:center; justify-content:center; font-size:1.5rem; cursor:pointer; min-height:44px;
}
.dir-btn.active-touch { border-color:var(--accent2); background:var(--cell-hover); }
.dir-btn.sel { border-color:var(--accent2); background:rgba(245,160,0,.1); }
.btn-row { display:flex; gap:8px; width:100%; flex-shrink:0; }
.btn {
  flex:1; padding:14px 8px; border:none; border-radius:10px;
  font-family:'Space Mono',monospace; font-size:clamp(.6rem,2.5vw,.7rem);
  font-weight:700; letter-spacing:1px; text-transform:uppercase; cursor:pointer; min-height:48px;
}
.btn-primary { background:var(--accent); color:#000; }
.btn-primary.active-touch { transform:scale(.97); box-shadow:0 4px 16px rgba(0,245,160,.3); }
.btn-secondary { background:var(--surface); color:var(--text); border:1px solid var(--border); }
.btn-secondary.active-touch { transform:scale(.97); border-color:var(--muted); }

/* ── Win Overlay ── */
.win-overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,.9); z-index:100;
  align-items:center; justify-content:center; flex-direction:column; gap:16px;
  text-align:center; padding:40px max(40px,var(--safe-left));
}
.win-overlay.show { display:flex; animation:fadeIn .4s ease; }
.win-title {
  font-family:'Syne','Arial Black',sans-serif; font-size:clamp(2rem,10vw,3rem); font-weight:900;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.win-sub { color:var(--muted); font-size:.75rem; letter-spacing:2px; }
.win-stats { color:var(--text); font-size:.8rem; }
.win-btns { display:flex; gap:10px; margin-top:8px; }
@keyframes fadeIn { from{opacity:0;transform:scale(.9)} to{opacity:1;transform:scale(1)} }

/* ── 横屏提示 ── */
#rotateHint {
  display:none; position:fixed; inset:0; z-index:200; background:var(--bg);
  align-items:center; justify-content:center; flex-direction:column; gap:12px; text-align:center; padding:32px;
}
#rotateHint.show { display:flex; }
#rotateHint .r-icon { font-size:3rem; animation:rotate-anim 1.5s ease-in-out infinite; }
@keyframes rotate-anim { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(-90deg)} }
#rotateHint p { color:var(--muted); font-size:.75rem; letter-spacing:2px; }
</style>
</head>
<body>

<div id="rotateHint">
  <div class="r-icon">📱</div>
  <p id="rotateText">PLEASE ROTATE TO PORTRAIT</p>
</div>

<!-- 语言切换栏 -->
<div class="lang-bar">
  <div class="lang-btn active" id="lang-en">EN</div>
  <div class="lang-btn" id="lang-zh">中文</div>
  <div class="lang-btn" id="lang-ja">日本語</div>
  <div class="lang-btn" id="lang-ko">한국어</div>
</div>

<!-- Level Select -->
<div id="screenSelect" class="screen">
  <div class="logo">
    <h1>ARROW</h1>
    <p id="logoSub">100 Levels Puzzle</p>
  </div>
</div>

<!-- Game Screen -->
<div id="screenGame" class="screen">
  <div class="top-bar">
    <button class="back-btn" id="backBtn">← <span id="backLabel">Levels</span></button>
    <div class="level-info">
      <div class="level-num" id="lvlNum">Level 1</div>
      <div class="level-tag" id="lvlTag">Beginner</div>
    </div>
    <button class="btn-secondary btn" id="resetTopBtn"
      style="flex:0;padding:10px 14px;font-size:.65rem;min-width:48px;">↺</button>
  </div>
  <div class="info-bar">
    <div class="info-box"><div class="info-label" id="labelMoves">MOVES</div><div class="info-value" id="movesVal">0</div></div>
    <div class="info-box"><div class="info-label" id="labelLeft">LEFT</div><div class="info-value" id="remainVal">—</div></div>
    <div class="info-box"><div class="info-label" id="labelTarget">TARGET</div><div class="info-value" id="targetVal">→</div></div>
  </div>
  <div class="target-box">
    <span class="target-arrow" id="targetArrow">→</span>
    <span class="target-text" id="targetDesc">All arrows → <strong id="targetName">Right</strong> · match counts</span>
  </div>
  <div class="grid-wrap"><div class="grid" id="grid"></div></div>
  <div class="dir-picker">
    <div class="dir-label" id="labelPick">Pick Direction</div>
    <div class="dir-grid" id="dirGrid"></div>
  </div>
  <div class="btn-row">
    <button class="btn btn-primary"   id="checkBtn">✓ <span id="btnCheck">Check</span></button>
    <button class="btn btn-secondary" id="resetBtn">↺ <span id="btnReset">Reset</span></button>
    <button class="btn btn-secondary" id="nextBtn">→ <span id="btnNext">Next</span></button>
  </div>
</div>

<!-- Win overlay -->
<div class="win-overlay" id="winOverlay">
  <div style="font-size:2.5rem">⭐⭐⭐</div>
  <div class="win-title" id="winTitle">PERFECT!</div>
  <div class="win-sub"   id="winSub">Level Complete</div>
  <div class="win-stats" id="winStats"></div>
  <div class="win-btns">
    <button class="btn btn-secondary" id="winSelectBtn"><span id="btnAllLevels">All Levels</span></button>
    <button class="btn btn-primary"   id="winNextBtn"><span id="btnWinNext">Next Level →</span></button>
  </div>
</div>

<script>
'use strict';

// ══════════════════════════════════════
// 多语言翻译表
// ══════════════════════════════════════
const I18N = {
  en: {

    labelMoves:'MOVES', labelLeft:'LEFT', labelTarget:'TARGET', labelPick:'Pick Direction',
    btnCheck:'Check', btnReset:'Reset', btnNext:'Next',
    winTitle:'PERFECT!', winSub:'Level Complete', btnAllLevels:'All Levels', btnWinNext:'Next Level →',
    rotate:'PLEASE ROTATE TO PORTRAIT',
    targetDesc:(icon,name)=>`All arrows ${icon} <strong>${name}</strong> · match counts`,
    levelWord:'Level', movesWord:'moves',
    chapters:['BEGINNER','EASY','NORMAL','MEDIUM','HARD','EXPERT','MASTER','LEGEND'],
    diffs:['Beginner','Easy','Normal','Medium','Hard','Expert','Master','Legend'],
    dirs:{up:'Up',ur:'Up-Right',right:'Right',dr:'Down-Right',down:'Down',dl:'Down-Left',left:'Left',ul:'Up-Left'},
  },

    btnCheck:'检查', btnReset:'重置', btnNext:'下一关',
    winTitle:'完美！', winSub:'关卡完成', btnAllLevels:'所有关卡', btnWinNext:'下一关 →',
    rotate:'请旋转至竖屏',
    targetDesc:(icon,name)=>`所有箭头 ${icon} <strong>${name}</strong> · 匹配数量`,

    diffs:['入门','简单','普通','中等','困难','专家','大师','传奇'],
    dirs:{up:'上',ur:'右上',right:'右',dr:'右下',down:'下',dl:'左下',left:'左',ul:'左上'},
  },
  ja: {

    btnCheck:'確認', btnReset:'リセット', btnNext:'次へ',
    winTitle:'パーフェクト！', winSub:'クリア！', btnAllLevels:'レベル一覧', btnWinNext:'次のレベル →',
    rotate:'縦向きにしてください',
    targetDesc:(icon,name)=>`全矢印 ${icon} <strong>${name}</strong> · 数を合わせよう`,
    levelWord:'レベル', movesWord:'手',
    chapters:['初級','かんたん','普通','中級','難しい','エキスパート','マスター','伝説'],
    diffs:['初級','かんたん','普通','中級','難しい','エキスパート','マスター','伝説'],
    dirs:{up:'上',ur:'右上',right:'右',dr:'右下',down:'下',dl:'左下',left:'左',ul:'左上'},
  },
  ko: {
    logoSub:'100레벨 퍼즐', backLabel:'레벨',
    labelMoves:'이동수', labelLeft:'남은', labelTarget:'목표', labelPick:'방향 선택',
    btnCheck:'확인', btnReset:'초기화', btnNext:'다음',
    winTitle:'완벽해요!', winSub:'레벨 클리어', btnAllLevels:'전체 레벨', btnWinNext:'다음 레벨 →',
    rotate:'세로 방향으로 돌려주세요',
    targetDesc:(icon,name)=>`모든 화살표 ${icon} <strong>${name}</strong> · 숫자 맞추기`,
    levelWord:'레벨', movesWord:'이동',
    chapters:['초보','쉬움','보통','중간','어려움','전문가','마스터','전설'],
    diffs:['초보','쉬움','보통','중간','어려움','전문가','마스터','전설'],
    dirs:{up:'위',ur:'오른쪽위',right:'오른쪽',dr:'오른쪽아래',down:'아래',dl:'왼쪽아래',left:'왼쪽',ul:'왼쪽위'},
  },
};

let curLang = localStorage.getItem('arrowLang') || 'en';
const tx = () => I18N[curLang];

function applyLang() {
  const L = tx();
  document.getElementById('logoSub').textContent      = L.logoSub;
  document.getElementById('backLabel').textContent    = L.backLabel;
  document.getElementById('labelMoves').textContent   = L.labelMoves;
  document.getElementById('labelLeft').textContent    = L.labelLeft;
  document.getElementById('labelTarget').textContent  = L.labelTarget;
  document.getElementById('labelPick').textContent    = L.labelPick;
  document.getElementById('btnCheck').textContent     = L.btnCheck;
  document.getElementById('btnReset').textContent     = L.btnReset;
  document.getElementById('btnNext').textContent      = L.btnNext;
  document.getElementById('winTitle').textContent     = L.winTitle;
  document.getElementById('winSub').textContent       = L.winSub;
  document.getElementById('btnAllLevels').textContent = L.btnAllLevels;
  document.getElementById('btnWinNext').textContent   = L.btnWinNext;
  document.getElementById('rotateText').textContent   = L.rotate;
  ['en','zh','ja','ko'].forEach(l =>
    document.getElementById('lang-'+l).classList.toggle('active', l===curLang)
  );
  if (levelData) {
    const td = DIR_MAP[levelData.targetDir];
    document.getElementById('targetDesc').innerHTML = L.targetDesc(td.icon, L.dirs[td.name]);
    document.getElementById('lvlTag').textContent   = diffLabel(curLvlIdx);
  }
  renderSelect();
}

// ══════════════════════════════════════
// 触摸工具
// ══════════════════════════════════════
function onTap(el, fn) {
  let moved=false;
  el.addEventListener('touchstart',()=>{moved=false;el.classList.add('active-touch');},{passive:true});
  el.addEventListener('touchmove', ()=>{moved=true;},{passive:true});
  el.addEventListener('touchend',  e=>{el.classList.remove('active-touch');if(!moved){e.preventDefault();fn(e);}});
  el.addEventListener('click', fn);
}
function vibrate(ms=10){try{navigator.vibrate&&navigator.vibrate(ms);}catch(e){}}

// ── 语言按钮
['en','zh','ja','ko'].forEach(l=>{
  onTap(document.getElementById('lang-'+l),()=>{
    vibrate(8); curLang=l; localStorage.setItem('arrowLang',l); applyLang();
  });
});

// ── WakeLock
async function requestWakeLock(){try{if('wakeLock'in navigator)await navigator.wakeLock.request('screen');}catch(e){}}
document.addEventListener('visibilitychange',async()=>{if(document.visibilityState==='visible')await requestWakeLock();});
requestWakeLock();

// ── 横屏检测
function checkOrientation(){
  const h=document.getElementById('rotateHint');
  window.innerWidth>window.innerHeight*1.2?h.classList.add('show'):h.classList.remove('show');
}
window.addEventListener('resize',checkOrientation);
window.addEventListener('orientationchange',()=>setTimeout(checkOrientation,200));
checkOrientation();

document.addEventListener('gesturestart',e=>e.preventDefault());
document.addEventListener('gesturechange',e=>e.preventDefault());
document.addEventListener('contextmenu',e=>e.preventDefault());

// ── 单元格尺寸
function calcCellSize(n){
  const vw=Math.min(window.innerWidth,520);
  return Math.max(36,Math.min(62,Math.floor((vw-32-20-n*3)/(n+1))));
}

// ══════════════════════════════════════
// DIRECTIONS
// ══════════════════════════════════════
const DIRS=[
  {icon:'↑',name:'up'},{icon:'↗',name:'ur'},{icon:'→',name:'right'},{icon:'↘',name:'dr'},
  {icon:'↓',name:'down'},{icon:'↙',name:'dl'},{icon:'←',name:'left'},{icon:'↖',name:'ul'},
];
const DIR_MAP={};
DIRS.forEach(d=>DIR_MAP[d.name]=d);

// ══════════════════════════════════════
// LEVEL GENERATION
// ══════════════════════════════════════
function seededRand(seed){
  let s=seed;
  return()=>{s=(s*1664525+1013904223)&0xffffffff;return(s>>>0)/0xffffffff;};
}
function generateLevel(i){
  const rand=seededRand(i*7919+31337);
  let size,fixedCount,allowDiag;
  if(i<10){size=3;fixedCount=3;allowDiag=false;}
  else if(i<20){size=3;fixedCount=2;allowDiag=false;}
  else if(i<35){size=4;fixedCount=4;allowDiag=false;}
  else if(i<50){size=4;fixedCount=3;allowDiag=true;}
  else if(i<65){size=5;fixedCount=5;allowDiag=true;}
  else if(i<80){size=5;fixedCount=4;allowDiag=true;}
  else if(i<90){size=6;fixedCount=6;allowDiag=true;}
  else{size=6;fixedCount=4;allowDiag=true;}
  const pool=allowDiag?DIRS:DIRS.filter(d=>['up','right','down','left'].includes(d.name));
  const targetDir=pool[Math.floor(rand()*pool.length)].name;
  const n=size;
  const rowCounts=Array.from({length:n},()=>Math.max(1,Math.floor(rand()*(n-1))+1));
  let grid=Array.from({length:n},()=>Array(n).fill(false));
  for(let r=0;r<n;r++){
    let slots=Array.from({length:n},(_,i)=>i);
    for(let i=slots.length-1;i>0;i--){const j=Math.floor(rand()*(i+1));[slots[i],slots[j]]=[slots[j],slots[i]];}
    for(let k=0;k<rowCounts[r];k++)grid[r][slots[k]]=true;
  }
  const colCounts=Array.from({length:n},(_,c)=>{let cnt=0;for(let r=0;r<n;r++)if(grid[r][c])cnt++;return cnt;});
  const occ=[];
  for(let r=0;r<n;r++)for(let c=0;c<n;c++)if(grid[r][c])occ.push([r,c]);
  for(let i=occ.length-1;i>0;i--){const j=Math.floor(rand()*(i+1));[occ[i],occ[j]]=[occ[j],occ[i]];}
  const fixed=occ.slice(0,Math.min(fixedCount,occ.length)).map(([r,c])=>[r,c,targetDir]);
  return{size:n,targetDir,rowCounts,colCounts,fixed};
}
const LEVELS=Array.from({length:100},(_,i)=>generateLevel(i));

function diffLabel(i){
  const idx=i<10?0:i<20?1:i<35?2:i<50?3:i<65?4:i<80?5:i<90?6:7;
  return tx().diffs[idx];
}

const CHAPTERS_DEF=[
  {color:'#00f5a0',range:[0,9]},{color:'#00c8f5',range:[10,19]},
  {color:'#8af500',range:[20,34]},{color:'#f5e000',range:[35,49]},
  {color:'#f5a000',range:[50,64]},{color:'#f56000',range:[65,79]},
  {color:'#f52060',range:[80,89]},{color:'#c020f5',range:[90,99]},
];

// ══════════════════════════════════════
// SAVE / LOAD
// ══════════════════════════════════════
function getSave(){try{return JSON.parse(localStorage.getItem('arrowPuzzleSave')||'{}')}catch{return{}}}
function setSave(d){try{localStorage.setItem('arrowPuzzleSave',JSON.stringify(d))}catch{}}
function markComplete(l){const s=getSave();s[l]=true;setSave(s);}
function isComplete(l){return!!getSave()[l];}

// ══════════════════════════════════════
// LEVEL SELECT
// ══════════════════════════════════════
function showSelect(){
  document.getElementById('screenSelect').style.display='flex';
  document.getElementById('screenGame').style.display='none';
  document.getElementById('winOverlay').classList.remove('show');
  renderSelect();
}
function renderSelect(){
  const sel=document.getElementById('screenSelect');
  sel.querySelectorAll('.chapter').forEach(el=>el.remove());
  CHAPTERS_DEF.forEach((ch,ci)=>{
    const div=document.createElement('div');div.className='chapter';
    const hdr=document.createElement('div');hdr.className='chapter-header';
    const dot=document.createElement('div');dot.className='chapter-dot';dot.style.background=ch.color;
    const ttl=document.createElement('div');ttl.className='chapter-title';ttl.style.color=ch.color;
    ttl.textContent=tx().chapters[ci];
    const sub=document.createElement('div');sub.className='chapter-sub';
    const[s,e]=ch.range;let done=0;
    for(let i=s;i<=e;i++)if(isComplete(i))done++;
    sub.textContent=`${done}/${e-s+1}`;
    hdr.append(dot,ttl,sub);div.appendChild(hdr);
    const g=document.createElement('div');g.className='level-grid';
    for(let i=ch.range[0];i<=ch.range[1];i++){
      const btn=document.createElement('div');btn.className='lvl-btn';
      if(isComplete(i))btn.classList.add('completed');
      btn.textContent=i+1;
      onTap(btn,()=>{vibrate(8);startLevel(i);});
      g.appendChild(btn);
    }
    div.appendChild(g);sel.appendChild(div);
  });
}

// ══════════════════════════════════════
// GAME STATE
// ══════════════════════════════════════
let curLvlIdx=0,levelData=null,gridState=[],selectedCell=null,selectedDir=null,moves=0;

function startLevel(idx){
  curLvlIdx=idx;levelData=LEVELS[idx];moves=0;selectedCell=null;selectedDir=null;
  const n=levelData.size;
  gridState=Array.from({length:n},()=>Array.from({length:n},()=>({dir:null,fixed:false})));
  for(const[r,c,d]of levelData.fixed)gridState[r][c]={dir:d,fixed:true};
  document.getElementById('screenSelect').style.display='none';
  document.getElementById('screenGame').style.display='flex';
  document.getElementById('winOverlay').classList.remove('show');
  const L=tx();
  document.getElementById('lvlNum').textContent = curLang==='zh'?`第${idx+1}关`:`${L.levelWord} ${idx+1}`;
  document.getElementById('lvlTag').textContent = diffLabel(idx);
  const td=DIR_MAP[levelData.targetDir];
  document.getElementById('targetVal').textContent   = td.icon;
  document.getElementById('targetArrow').textContent = td.icon;
  document.getElementById('targetDesc').innerHTML    = L.targetDesc(td.icon,L.dirs[td.name]);
  document.getElementById('screenGame').scrollTop=0;
  renderGrid();renderDirPicker();updateInfo();
}
function resetLevel(){vibrate(15);startLevel(curLvlIdx);}
function nextLevel(){startLevel((curLvlIdx+1)%100);}

// ══════════════════════════════════════
// RENDER GRID
// ══════════════════════════════════════
function renderGrid(){
  const n=levelData.size,el=document.getElementById('grid');
  const cs=calcCellSize(n);
  document.documentElement.style.setProperty('--cell-size',cs+'px');
  el.style.gridTemplateColumns=`repeat(${n+1},${cs}px)`;
  el.innerHTML='';
  for(let r=0;r<=n;r++)for(let c=0;c<=n;c++){
    const cell=document.createElement('div');cell.className='cell';
    if(r===n&&c===n){cell.classList.add('header-cell');}
    else if(r===n){cell.classList.add('header-cell');cell.textContent=levelData.colCounts[c];}
    else if(c===n){cell.classList.add('header-cell');cell.textContent=levelData.rowCounts[r];}
    else{
      const cd=gridState[r][c];
      if(cd.fixed)cell.classList.add('fixed');
      const sp=document.createElement('span');sp.className='a-icon';
      if(cd.dir){sp.textContent=DIR_MAP[cd.dir].icon;if(!cd.fixed)cell.classList.add('user-placed');}
      cell.appendChild(sp);
      if(!cd.fixed)onTap(cell,()=>onCellClick(r,c));
      if(selectedCell&&selectedCell[0]===r&&selectedCell[1]===c)cell.classList.add('sel');
    }
    el.appendChild(cell);
  }
}
function onCellClick(r,c){
  if(gridState[r][c].fixed)return;
  vibrate(8);
  if(selectedDir!==null){placeArrow(r,c,selectedDir);return;}
  selectedCell=[r,c];renderGrid();
}
function placeArrow(r,c,d){
  if(gridState[r][c].fixed)return;
  gridState[r][c].dir===d?gridState[r][c].dir=null:(gridState[r][c].dir=d,moves++);
  selectedCell=null;updateInfo();renderGrid();
}

// ══════════════════════════════════════
// DIR PICKER
// ══════════════════════════════════════
function renderDirPicker(){
  const el=document.getElementById('dirGrid');el.innerHTML='';
  DIRS.forEach(d=>{
    const btn=document.createElement('div');btn.className='dir-btn';
    if(selectedDir===d.name)btn.classList.add('sel');
    btn.textContent=d.icon;
    onTap(btn,()=>{
      vibrate(8);
      if(selectedDir===d.name){selectedDir=null;}
      else{
        selectedDir=d.name;
        if(selectedCell){const[r,c]=selectedCell;placeArrow(r,c,selectedDir);selectedCell=null;selectedDir=null;}
      }
      renderDirPicker();
    });
    el.appendChild(btn);
  });
}

// ══════════════════════════════════════
// INFO BAR
// ══════════════════════════════════════
function updateInfo(){
  document.getElementById('movesVal').textContent=moves;
  const n=levelData.size,total=levelData.rowCounts.reduce((a,b)=>a+b,0);
  let placed=0;
  for(let r=0;r<n;r++)for(let c=0;c<n;c++)if(gridState[r][c].dir)placed++;
  document.getElementById('remainVal').textContent=Math.max(0,total-placed);
}

// ══════════════════════════════════════
// CHECK SOLUTION
// ══════════════════════════════════════
function checkSolution(){
  const n=levelData.size,target=levelData.targetDir;
  let ok=true;
  for(let r=0;r<n;r++)for(let c=0;c<n;c++){const d=gridState[r][c].dir;if(d&&d!==target)ok=false;}
  for(let r=0;r<n;r++){let cnt=0;for(let c=0;c<n;c++)if(gridState[r][c].dir)cnt++;if(cnt!==levelData.rowCounts[r])ok=false;}
  for(let c=0;c<n;c++){let cnt=0;for(let r=0;r<n;r++)if(gridState[r][c].dir)cnt++;if(cnt!==levelData.colCounts[c])ok=false;}
  const total=levelData.rowCounts.reduce((a,b)=>a+b,0);
  let placed=0;
  for(let r=0;r<n;r++)for(let c=0;c<n;c++)if(gridState[r][c].dir)placed++;
  if(placed!==total)ok=false;
  if(ok){
    vibrate([20,50,20]);markComplete(curLvlIdx);
    const L=tx();
    const lvlStr=curLang==='zh'?`第${curLvlIdx+1}关`:`${L.levelWord} ${curLvlIdx+1}`;
    document.getElementById('winTitle').textContent = L.winTitle;
    document.getElementById('winSub').textContent   = L.winSub;
    document.getElementById('winStats').textContent = `${lvlStr} · ${moves} ${L.movesWord}`;
    document.getElementById('winOverlay').classList.add('show');
  } else {
    vibrate(80);flashWrong();
  }
}
function flashWrong(){
  const n=levelData.size,target=levelData.targetDir;
  const cells=document.getElementById('grid').querySelectorAll('.cell');
  for(let r=0;r<n;r++)for(let c=0;c<n;c++){
    const d=gridState[r][c].dir;
    if(d&&d!==target){const idx=r*(n+1)+c;cells[idx]?.classList.add('wrong');setTimeout(()=>cells[idx]?.classList.remove('wrong'),400);}
  }
}

// ══════════════════════════════════════
// 按钮绑定
// ══════════════════════════════════════
onTap(document.getElementById('backBtn'),     ()=>showSelect());
onTap(document.getElementById('resetTopBtn'), ()=>resetLevel());
onTap(document.getElementById('checkBtn'),    ()=>checkSolution());
onTap(document.getElementById('resetBtn'),    ()=>resetLevel());
onTap(document.getElementById('nextBtn'),     ()=>nextLevel());
onTap(document.getElementById('winSelectBtn'),()=>showSelect());
onTap(document.getElementById('winNextBtn'),  ()=>nextLevel());

// ══════════════════════════════════════
// START
// ══════════════════════════════════════
applyLang();
showSelect();

if('serviceWorker'in navigator){
  navigator.serviceWorker.register('/Arrowmind/sw.js');
}
</script>
