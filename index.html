<html lang="en">
<head>
<meta charset="UTF-8">
<!--
  ╔══════════════════════════════════════════════════════╗

  ║  ✓ 安全区适配（刘海屏/全面屏）                       ║
  ║  ✓ 触摸优化（touchstart + 无延迟）                   ║
  ║  ✓ 屏幕常亮（WakeLock API）                          ║
  ║  ✓ 禁止橡皮筋/文字选中/右键菜单                      ║
  ║  ✓ 禁止浏览器手势干扰游戏                            ║
  ║  ✓ 震动反馈（Haptic）                                ║
  ║  ✓ 深色状态栏 meta                                   ║
  ║  ✓ 自适应单元格大小（手机/平板）                     ║
  ╚══════════════════════════════════════════════════════╝
-->

<!-- Android / Amazon App Store 必要 meta -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Arrow Puzzle · 100 Levels</title>

<style>
/* ── 字体：内联 base64 的 Space Mono（关键子集）──
   为减小文件体积，此处使用系统等宽字体降级方案。
   如需精确字体请在打包后将 ttf 文件放入 www/ 并用 @font-face 引用。 */
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@800;900&display=swap');

/* ── 安全区变量（刘海屏/Android 全面屏）── */
:root {
  --bg: #0a0a0f;
  --surface: #13131f;
  --border: #1e1e30;
  --accent: #00f5a0;
  --accent2: #f5a000;
  --danger: #f54060;
  --text: #e8e8f0;
  --muted: #5a5a7a;
  --cell: #1a1a2e;
  --cell-hover: #202040;
  --cell-size: 62px;

  /* 安全区内边距 */
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left: env(safe-area-inset-left, 0px);
  --safe-right: env(safe-area-inset-right, 0px);
}

/* ── 全局重置 ── */
*, *::before, *::after {
  margin: 0; padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent; /* 去掉 Android 点击高亮 */
  -webkit-touch-callout: none;              /* 禁止长按菜单 */
  user-select: none;
  -webkit-user-select: none;
}

html {
  height: 100%;
  /* 禁止页面整体滚动/橡皮筋 */
  overflow: hidden;
  overscroll-behavior: none;
  touch-action: pan-y; /* 允许列表竖向滚动，但禁止页面级手势 */
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Mono', 'Courier New', monospace;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  /* 安全区适配 */
  padding-top: max(16px, var(--safe-top));
  padding-bottom: max(16px, var(--safe-bottom));
  padding-left: max(16px, var(--safe-left));
  padding-right: max(16px, var(--safe-right));
  overflow: hidden;
  overscroll-behavior: none;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(0,245,160,0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(245,160,0,0.04) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* ── 通用屏幕容器 ── */
.screen {
  width: 100%;
  max-width: 520px;
  position: relative;
  z-index: 1;
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;
  /* 隐藏滚动条但保留滚动功能 */
  scrollbar-width: none;
}
.screen::-webkit-scrollbar { display: none; }

/* ════════════════════════════════════
   LEVEL SELECT SCREEN
════════════════════════════════════ */
#screenSelect {
  display: flex;
  flex-direction: column;
  gap: 16px;
  align-items: center;
  padding-bottom: 24px;
}

.logo { text-align: center; margin-bottom: 4px; padding-top: 8px; }
.logo h1 {
  font-family: 'Syne', 'Arial Black', sans-serif;
  font-size: clamp(2rem, 8vw, 2.8rem);
  font-weight: 900;
  letter-spacing: -2px; line-height: 1;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.logo p {
  font-size: clamp(0.55rem, 2vw, 0.65rem);
  color: var(--muted); letter-spacing: 3px;
  text-transform: uppercase; margin-top: 4px;
}

.chapter {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
}
.chapter-header {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.chapter-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.chapter-title {
  font-size: clamp(0.6rem, 2vw, 0.7rem);
  letter-spacing: 2px; text-transform: uppercase; font-weight: 700;
}
.chapter-sub { font-size: 0.6rem; color: var(--muted); margin-left: auto; }

.level-grid { display: grid; grid-template-columns: repeat(10, 1fr); }
.lvl-btn {
  aspect-ratio: 1;
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(0.55rem, 1.8vw, 0.65rem);
  font-weight: 700; cursor: pointer;
  border: 1px solid var(--border);
  color: var(--muted);
  /* 触摸优化：更大的最小点击区域 */
  min-height: 36px;
  transition: background 0.1s, color 0.1s;
  position: relative;
}
.lvl-btn.active-touch { background: var(--cell-hover); color: var(--text); }
.lvl-btn.completed { color: var(--accent); }
.lvl-btn.completed::after {
  content: '✓'; position: absolute;
  top: 2px; right: 3px; font-size: 0.4rem; color: var(--accent);
}
.lvl-btn.current { color: var(--accent2); border-color: var(--accent2); }

/* ════════════════════════════════════
   GAME SCREEN
════════════════════════════════════ */
#screenGame {
  display: none;
  flex-direction: column;
  gap: 12px;
  align-items: center;
  padding-bottom: 8px;
}

.top-bar {
  display: flex; align-items: center;
  justify-content: space-between; width: 100%;
  flex-shrink: 0;
}
.back-btn {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); padding: 10px 16px; border-radius: 8px;
  font-family: 'Space Mono', monospace; font-size: 0.7rem;
  cursor: pointer; transition: border-color 0.1s;
  /* 保证足够大的触摸区域 */
  min-width: 64px; min-height: 44px;
  display: flex; align-items: center; justify-content: center;
}

.level-info { text-align: center; }
.level-num {
  font-family: 'Syne', 'Arial Black', sans-serif;
  font-size: clamp(0.9rem, 4vw, 1.1rem); font-weight: 900;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.level-tag { font-size: 0.6rem; color: var(--muted); letter-spacing: 1px; }

.info-bar { display: flex; gap: 8px; width: 100%; flex-shrink: 0; }
.info-box {
  flex: 1; background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 8px 6px; text-align: center;
}
.info-label { font-size: 0.5rem; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
.info-value {
  font-size: clamp(1rem, 4vw, 1.2rem);
  font-weight: 700; color: var(--accent); margin-top: 2px;
}

.target-box {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  border-left: 3px solid var(--accent); border-radius: 10px;
  padding: 8px 12px; font-size: 0.7rem; color: var(--muted);
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.target-arrow { font-size: 1.4rem; }
.target-text strong { color: var(--accent); }

/* 网格区域 */
.grid-wrap {
  overflow: auto; width: 100%;
  display: flex; justify-content: center;
  flex-shrink: 0;
  /* 阻止网格区域的 swipe 被当成页面手势 */
  touch-action: none;
}
.grid {
  display: grid; gap: 3px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 10px;
  flex-shrink: 0;
}
.cell {
  width: var(--cell-size); height: var(--cell-size);
  background: var(--cell); border: 2px solid var(--border);
  border-radius: 8px; display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: clamp(1.3rem, 5vw, 1.6rem);
  transition: background 0.1s, border-color 0.1s, transform 0.1s;
  position: relative;
  /* 确保触摸目标足够大 */
  min-width: 36px; min-height: 36px;
}
.cell.fixed { cursor: default; background: #0d1a12; border-color: rgba(0,245,160,0.3); }
.cell.fixed .a-icon { color: var(--accent); filter: drop-shadow(0 0 5px var(--accent)); }
.cell.user-placed .a-icon { color: var(--accent2); }
.cell.correct { border-color: var(--accent); background: #0a1f12; animation: pop 0.35s ease; }
.cell.wrong   { border-color: var(--danger); background: #1f0a0e; animation: shake 0.3s ease; }
.cell.sel     { border-color: var(--accent2); box-shadow: 0 0 0 2px rgba(245,160,0,0.25); }
.cell.active-touch:not(.fixed):not(.header-cell) {
  background: var(--cell-hover); border-color: var(--muted); transform: scale(1.06);
}
.cell.header-cell {
  cursor: default; background: transparent; border: none;
  font-size: clamp(0.7rem, 3vw, 0.9rem); font-weight: 700; color: var(--accent);
}
.a-icon { font-size: clamp(1.2rem, 5vw, 1.8rem); line-height: 1; }

@keyframes pop   { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }

/* 方向选择器 */
.dir-picker {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 10px; width: 100%; flex-shrink: 0;
}
.dir-label {
  font-size: 0.6rem; color: var(--muted); letter-spacing: 2px;
  text-transform: uppercase; margin-bottom: 8px; text-align: center;
}
.dir-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
.dir-btn {
  background: var(--cell); border: 2px solid var(--border);
  border-radius: 8px; height: 48px; display: flex; align-items: center;
  justify-content: center; font-size: 1.5rem; cursor: pointer;
  transition: border-color 0.1s, background 0.1s;
  /* 确保足够的触摸目标 */
  min-height: 44px;
}
.dir-btn.active-touch { border-color: var(--accent2); background: var(--cell-hover); }
.dir-btn.sel { border-color: var(--accent2); background: rgba(245,160,0,0.1); }

/* 按钮行 */
.btn-row { display: flex; gap: 8px; width: 100%; flex-shrink: 0; }
.btn {
  flex: 1; padding: 14px 8px; border: none; border-radius: 10px;
  font-family: 'Space Mono', monospace;
  font-size: clamp(0.6rem, 2.5vw, 0.7rem);
  font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
  cursor: pointer; transition: transform 0.1s, box-shadow 0.1s;
  /* 最小触摸高度 */
  min-height: 48px;
}
.btn-primary { background: var(--accent); color: #000; }
.btn-primary.active-touch { transform: scale(0.97); box-shadow: 0 4px 16px rgba(0,245,160,0.3); }
.btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
.btn-secondary.active-touch { transform: scale(0.97); border-color: var(--muted); }

/* ════════════════════════════════════
   WIN OVERLAY
════════════════════════════════════ */
.win-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.90); z-index: 100;
  align-items: center; justify-content: center;
  flex-direction: column; gap: 16px; text-align: center;
  padding: 40px max(40px, var(--safe-left));
}
.win-overlay.show { display: flex; animation: fadeIn 0.4s ease; }
.win-title {
  font-family: 'Syne', 'Arial Black', sans-serif;
  font-size: clamp(2rem, 10vw, 3rem); font-weight: 900;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.win-sub  { color: var(--muted); font-size: 0.75rem; letter-spacing: 2px; }
.win-stats { color: var(--text); font-size: 0.8rem; }
.win-btns { display: flex; gap: 10px; margin-top: 8px; }
@keyframes fadeIn { from{opacity:0;transform:scale(0.9)} to{opacity:1;transform:scale(1)} }

/* ── 竖屏锁定提示（横屏时显示）── */
#rotateHint {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: var(--bg);
  align-items: center; justify-content: center;
  flex-direction: column; gap: 12px; text-align: center; padding: 32px;
}
#rotateHint.show { display: flex; }
#rotateHint .r-icon { font-size: 3rem; animation: rotate-anim 1.5s ease-in-out infinite; }
@keyframes rotate-anim { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(-90deg)} }
#rotateHint p { color: var(--muted); font-size: 0.75rem; letter-spacing: 2px; }
</style>

<body>

<script>
'use strict';

// ══════════════════════════════════════════════════════════
// 触摸优化工具函数
// ══════════════════════════════════════════════════════════

/**
 * 替代 click：使用 touchstart（无 300ms 延迟）
 * 同时保留 click 以支持鼠标/键盘操作
 */
function onTap(el, fn) {
  let touchMoved = false;
  el.addEventListener('touchstart', e => {
    touchMoved = false;
    el.classList.add('active-touch');
  }, { passive: true });
  el.addEventListener('touchmove', () => { touchMoved = true; }, { passive: true });
  el.addEventListener('touchend', e => {
    el.classList.remove('active-touch');
    if (!touchMoved) {
      e.preventDefault(); // 阻止触发 click（防止双触发）
      fn(e);
    }
  });
  el.addEventListener('click', fn); // 鼠标降级
}

/** 震动反馈（Android 有效） */
function vibrate(ms = 10) {
  try { navigator.vibrate && navigator.vibrate(ms); } catch(e) {}
}

// ══════════════════════════════════════════════════════════
// 屏幕常亮（WakeLock API）
// ══════════════════════════════════════════════════════════
let wakeLock = null;
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
    }
  } catch(e) {}
}
document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible') await requestWakeLock();
});
requestWakeLock();

// ══════════════════════════════════════════════════════════
// 横屏检测
// ══════════════════════════════════════════════════════════
function checkOrientation() {
  const hint = document.getElementById('rotateHint');
  // 如果宽度 > 高度 * 1.2 则认为横屏（给一定容忍）
  if (window.innerWidth > window.innerHeight * 1.2) {
    hint.classList.add('show');
  } else {
    hint.classList.remove('show');
  }
}
window.addEventListener('resize', checkOrientation);
window.addEventListener('orientationchange', () => setTimeout(checkOrientation, 200));
checkOrientation();

// ══════════════════════════════════════════════════════════
// 禁止系统手势干扰
// ══════════════════════════════════════════════════════════
// 禁止双指缩放
document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('gesturechange', e => e.preventDefault());
// 禁止右键菜单
document.addEventListener('contextmenu', e => e.preventDefault());

// ══════════════════════════════════════════════════════════
// 自适应单元格尺寸
// ══════════════════════════════════════════════════════════
function calcCellSize(gridN) {
  const vw = Math.min(window.innerWidth, 520);
  // 可用宽度 = 视口宽 - padding(32) - grid padding(20) - 间距
  const available = vw - 32 - 20 - (gridN) * 3;
  const natural = Math.floor(available / (gridN + 1));
  // 在合理范围内限制
  return Math.max(36, Math.min(62, natural));
}

// ══════════════════════════════════════════════════════════
// DIRECTIONS
// ══════════════════════════════════════════════════════════
const DIRS = [
  {icon:'↑',name:'up',   label:'Up'},
  {icon:'↗',name:'ur',   label:'Up-Right'},
  {icon:'→',name:'right',label:'Right'},
  {icon:'↘',name:'dr',   label:'Down-Right'},
  {icon:'↓',name:'down', label:'Down'},
  {icon:'↙',name:'dl',   label:'Down-Left'},
  {icon:'←',name:'left', label:'Left'},
  {icon:'↖',name:'ul',   label:'Up-Left'},
];
const DIR_MAP = {};
DIRS.forEach(d => DIR_MAP[d.name] = d);

// ══════════════════════════════════════════════════════════
// LEVEL GENERATION（与原版完全一致）
// ══════════════════════════════════════════════════════════
function seededRand(seed) {
  let s = seed;
  return () => {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 0xffffffff;
  };
}

function generateLevel(lvlIndex) {
  const rand = seededRand(lvlIndex * 7919 + 31337);
  let size, fixedCount, allowDiag;
  if      (lvlIndex < 10) { size=3; fixedCount=3; allowDiag=false; }
  else if (lvlIndex < 20) { size=3; fixedCount=2; allowDiag=false; }
  else if (lvlIndex < 35) { size=4; fixedCount=4; allowDiag=false; }
  else if (lvlIndex < 50) { size=4; fixedCount=3; allowDiag=true;  }
  else if (lvlIndex < 65) { size=5; fixedCount=5; allowDiag=true;  }
  else if (lvlIndex < 80) { size=5; fixedCount=4; allowDiag=true;  }
  else if (lvlIndex < 90) { size=6; fixedCount=6; allowDiag=true;  }
  else                    { size=6; fixedCount=4; allowDiag=true;  }

  const dirPool = allowDiag ? DIRS : DIRS.filter(d=>['up','right','down','left'].includes(d.name));
  const targetDir = dirPool[Math.floor(rand()*dirPool.length)].name;
  const n = size;

  let grid = Array.from({length:n}, ()=>Array(n).fill(false));
  const rowCounts = Array.from({length:n}, ()=>Math.max(1,Math.floor(rand()*(n-1))+1));
  grid = Array.from({length:n}, ()=>Array(n).fill(false));
  for (let r=0;r<n;r++) {
    let slots = Array.from({length:n},(_,i)=>i);
    for (let i=slots.length-1;i>0;i--) {
      const j=Math.floor(rand()*(i+1));
      [slots[i],slots[j]]=[slots[j],slots[i]];
    }
    for (let k=0;k<rowCounts[r];k++) grid[r][slots[k]]=true;
  }
  const colCounts = Array.from({length:n},(_,c)=>{
    let cnt=0; for(let r=0;r<n;r++) if(grid[r][c]) cnt++; return cnt;
  });

  const occupied=[];
  for(let r=0;r<n;r++) for(let c=0;c<n;c++) if(grid[r][c]) occupied.push([r,c]);
  for(let i=occupied.length-1;i>0;i--) {
    const j=Math.floor(rand()*(i+1));
    [occupied[i],occupied[j]]=[occupied[j],occupied[i]];
  }
  const actualFixed=Math.min(fixedCount,occupied.length);
  const fixed=occupied.slice(0,actualFixed).map(([r,c])=>[r,c,targetDir]);

  return {size:n,targetDir,rowCounts,colCounts,fixed,solution:grid};
}

const LEVELS = Array.from({length:100},(_,i)=>generateLevel(i));

function diffLabel(i) {
  if(i<10)  return 'Beginner';
  if(i<20)  return 'Easy';
  if(i<35)  return 'Normal';
  if(i<50)  return 'Medium';
  if(i<65)  return 'Hard';
  if(i<80)  return 'Expert';
  if(i<90)  return 'Master';
  return 'Legend';
}

const CHAPTERS = [
  {name:'BEGINNER', color:'#00f5a0', range:[0,9]},
  {name:'EASY',     color:'#00c8f5', range:[10,19]},
  {name:'NORMAL',   color:'#8af500', range:[20,34]},
  {name:'MEDIUM',   color:'#f5e000', range:[35,49]},
  {name:'HARD',     color:'#f5a000', range:[50,64]},
  {name:'EXPERT',   color:'#f56000', range:[65,79]},
  {name:'MASTER',   color:'#f52060', range:[80,89]},
  {name:'LEGEND',   color:'#c020f5', range:[90,99]},
];

// ══════════════════════════════════════════════════════════
// SAVE / LOAD
// ══════════════════════════════════════════════════════════
function getSave() {
  try { return JSON.parse(localStorage.getItem('arrowPuzzleSave')||'{}'); } catch { return {}; }
}
function setSave(data) {
  try { localStorage.setItem('arrowPuzzleSave',JSON.stringify(data)); } catch {}
}
function markComplete(lvl) { const s=getSave(); s[lvl]=true; setSave(s); }
function isComplete(lvl)   { return !!getSave()[lvl]; }

// ══════════════════════════════════════════════════════════
// LEVEL SELECT
// ══════════════════════════════════════════════════════════
function showSelect() {
  document.getElementById('screenSelect').style.display='flex';
  document.getElementById('screenGame').style.display='none';
  document.getElementById('winOverlay').classList.remove('show');
  renderSelect();
}

function renderSelect() {
  const sel = document.getElementById('screenSelect');
  sel.querySelectorAll('.chapter').forEach(el=>el.remove());

  CHAPTERS.forEach(ch => {
    const div = document.createElement('div');
    div.className = 'chapter';

    const header = document.createElement('div');
    header.className = 'chapter-header';
    const dot = document.createElement('div');
    dot.className = 'chapter-dot'; dot.style.background = ch.color;
    const title = document.createElement('div');
    title.className = 'chapter-title'; title.style.color = ch.color;
    title.textContent = ch.name;
    const sub = document.createElement('div');
    sub.className = 'chapter-sub';
    const [s,e] = ch.range;
    let done=0; for(let i=s;i<=e;i++) if(isComplete(i)) done++;
    sub.textContent = `${done}/${e-s+1}`;
    header.append(dot,title,sub);
    div.appendChild(header);

    const grid = document.createElement('div');
    grid.className = 'level-grid';
    for (let i=ch.range[0]; i<=ch.range[1]; i++) {
      const btn = document.createElement('div');
      btn.className = 'lvl-btn';
      if (isComplete(i)) btn.classList.add('completed');
      btn.textContent = i+1;
      // 使用触摸优化的 onTap
      onTap(btn, () => { vibrate(8); startLevel(i); });
      grid.appendChild(btn);
    }
    div.appendChild(grid);
    sel.appendChild(div);
  });
}

// ══════════════════════════════════════════════════════════
// GAME STATE
// ══════════════════════════════════════════════════════════
let curLvlIdx   = 0;
let levelData   = null;
let gridState   = [];
let selectedCell = null;
let selectedDir  = null;
let moves        = 0;

function startLevel(idx) {
  curLvlIdx   = idx;
  levelData   = LEVELS[idx];
  moves       = 0;
  selectedCell = null;
  selectedDir  = null;

  const n = levelData.size;
  gridState = Array.from({length:n}, ()=>Array.from({length:n}, ()=>({dir:null,fixed:false})));
  for (const [r,c,d] of levelData.fixed) gridState[r][c]={dir:d,fixed:true};

  document.getElementById('screenSelect').style.display='none';
  document.getElementById('screenGame').style.display='flex';
  document.getElementById('winOverlay').classList.remove('show');

  document.getElementById('lvlNum').textContent  = `Level ${idx+1}`;
  document.getElementById('lvlTag').textContent  = diffLabel(idx);

  const td = DIR_MAP[levelData.targetDir];
  document.getElementById('targetVal').textContent   = td.icon;
  document.getElementById('targetArrow').textContent = td.icon;
  document.getElementById('targetName').textContent  = td.label;

  // 滚动到顶部
  document.getElementById('screenGame').scrollTop = 0;

  renderGrid();
  renderDirPicker();
  updateInfo();
}

function resetLevel() { vibrate(15); startLevel(curLvlIdx); }
function nextLevel()  { startLevel((curLvlIdx+1)%100); }

// ══════════════════════════════════════════════════════════
// RENDER GRID
// ══════════════════════════════════════════════════════════
function renderGrid() {
  const n  = levelData.size;
  const el = document.getElementById('grid');
  const cs = calcCellSize(n);
  document.documentElement.style.setProperty('--cell-size', cs+'px');
  el.style.gridTemplateColumns = `repeat(${n+1},${cs}px)`;
  el.innerHTML = '';

  for (let r=0; r<=n; r++) {
    for (let c=0; c<=n; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';

      if (r===n && c===n) {
        cell.classList.add('header-cell');
      } else if (r===n) {
        cell.classList.add('header-cell');
        cell.textContent = levelData.colCounts[c];
      } else if (c===n) {
        cell.classList.add('header-cell');
        cell.textContent = levelData.rowCounts[r];
      } else {
        const cd = gridState[r][c];
        if (cd.fixed) cell.classList.add('fixed');
        const span = document.createElement('span');
        span.className = 'a-icon';
        if (cd.dir) {
          span.textContent = DIR_MAP[cd.dir].icon;
          if (!cd.fixed) cell.classList.add('user-placed');
        }
        cell.appendChild(span);

        if (!cd.fixed) {
          onTap(cell, () => onCellClick(r,c));
        }
        cell.dataset.r = r; cell.dataset.c = c;
        if (selectedCell && selectedCell[0]===r && selectedCell[1]===c)
          cell.classList.add('sel');
      }
      el.appendChild(cell);
    }
  }
}

function onCellClick(r,c) {
  if (gridState[r][c].fixed) return;
  vibrate(8);
  if (selectedDir !== null) { placeArrow(r,c,selectedDir); return; }
  selectedCell = [r,c];
  renderGrid();
}

function placeArrow(r,c,dirName) {
  if (gridState[r][c].fixed) return;
  if (gridState[r][c].dir===dirName) { gridState[r][c].dir=null; }
  else { gridState[r][c].dir=dirName; moves++; }
  selectedCell = null;
  updateInfo();
  renderGrid();
}

// ══════════════════════════════════════════════════════════
// DIR PICKER
// ══════════════════════════════════════════════════════════
function renderDirPicker() {
  const el = document.getElementById('dirGrid');
  el.innerHTML = '';
  DIRS.forEach(d => {
    const btn = document.createElement('div');
    btn.className = 'dir-btn';
    if (selectedDir===d.name) btn.classList.add('sel');
    btn.textContent = d.icon;
    onTap(btn, () => {
      vibrate(8);
      if (selectedDir===d.name) { selectedDir=null; }
      else {
        selectedDir=d.name;
        if (selectedCell) {
          const [r,c]=selectedCell;
          placeArrow(r,c,selectedDir);
          selectedCell=null; selectedDir=null;
        }
      }
      renderDirPicker();
    });
    el.appendChild(btn);
  });
}

// ══════════════════════════════════════════════════════════
// INFO BAR
// ══════════════════════════════════════════════════════════
function updateInfo() {
  document.getElementById('movesVal').textContent = moves;
  const n = levelData.size;
  const totalExpected = levelData.rowCounts.reduce((a,b)=>a+b,0);
  let placed=0;
  for(let r=0;r<n;r++) for(let c=0;c<n;c++) if(gridState[r][c].dir) placed++;
  document.getElementById('remainVal').textContent = Math.max(0, totalExpected-placed);
}

// ══════════════════════════════════════════════════════════
// CHECK SOLUTION
// ══════════════════════════════════════════════════════════
function checkSolution() {
  const n=levelData.size, target=levelData.targetDir;
  let ok=true;
  for(let r=0;r<n;r++) for(let c=0;c<n;c++) {
    const d=gridState[r][c].dir;
    if(d && d!==target) ok=false;
  }
  for(let r=0;r<n;r++) {
    let cnt=0; for(let c=0;c<n;c++) if(gridState[r][c].dir) cnt++;
    if(cnt!==levelData.rowCounts[r]) ok=false;
  }
  for(let c=0;c<n;c++) {
    let cnt=0; for(let r=0;r<n;r++) if(gridState[r][c].dir) cnt++;
    if(cnt!==levelData.colCounts[c]) ok=false;
  }
  const totalExpected=levelData.rowCounts.reduce((a,b)=>a+b,0);
  let placed=0;
  for(let r=0;r<n;r++) for(let c=0;c<n;c++) if(gridState[r][c].dir) placed++;
  if(placed!==totalExpected) ok=false;

  if (ok) {
    vibrate([20,50,20]); // 成功震动模式
    markComplete(curLvlIdx);
    document.getElementById('winStats').textContent = `Level ${curLvlIdx+1} · ${moves} moves`;
    document.getElementById('winOverlay').classList.add('show');
  } else {
    vibrate(80); // 错误震动
    flashWrong();
  }
}

function flashWrong() {
  const n=levelData.size, target=levelData.targetDir;
  const cells=document.getElementById('grid').querySelectorAll('.cell');
  for(let r=0;r<n;r++) for(let c=0;c<n;c++) {
    const d=gridState[r][c].dir;
    if(d && d!==target) {
      const idx=r*(n+1)+c;
      cells[idx]?.classList.add('wrong');
      setTimeout(()=>cells[idx]?.classList.remove('wrong'),400);
    }
  }
}

// ══════════════════════════════════════════════════════════
// 按钮绑定（全部用 onTap）
// ══════════════════════════════════════════════════════════
onTap(document.getElementById('backBtn'),     () => showSelect());
onTap(document.getElementById('resetTopBtn'), () => resetLevel());
onTap(document.getElementById('checkBtn'),    () => checkSolution());
onTap(document.getElementById('resetBtn'),    () => resetLevel());
onTap(document.getElementById('nextBtn'),     () => nextLevel());
onTap(document.getElementById('winSelectBtn'),() => showSelect());
onTap(document.getElementById('winNextBtn'),  () => nextLevel());

// ══════════════════════════════════════════════════════════
// START
// ══════════════════════════════════════════════════════════
showSelect();

// Service Worker 注册
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/Arrowmind/sw.js');
}
</script>
